<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="rockPaperScissor.css">
</head>
<body>

  <div class="container">

    <h1>Rock Paper Scissors</h1>

    <div class="score-board">
      <div class="score">
        <p>You</p>
        <span id="user-score">0</span>
      </div>

      <div class="score">
        <p>Computer</p>
        <span id="comp-score">0</span>
      </div>
    </div>

    <div class="choices">

      <button class="choice rock">
        ✊
        <p>Rock</p>
      </button>

      <button class="choice paper">
        ✋
        <p>Paper</p>
      </button>

      <button class="choice scissor">
        ✌️
        <p>Scissor</p>
      </button>

    </div>

    <div class="result">
      <p>Choose your move!</p>
    </div>

    <!-- Reset Button -->
    <button class="reset-btn">Reset Game</button>

  </div>
<script src="rockPaperScissor.js"></script>
</body>
</html>
